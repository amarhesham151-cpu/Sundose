<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Invitation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;

  background: url('https://i.ibb.co/kVKzLdcJ/0de783a64daaaaa95a75f348bc23212f.jpg')
  no-repeat center center/cover;

  color: white;
  overflow: hidden;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: -1;
}

/* INPUT */
.input-box {
  margin-top: 50px;
}

.input-box p {
  font-size: 18px;
  margin-bottom: 10px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #89CFF0;
  font-weight: bold;
}

/* shake */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.3s;
}

/* ENVELOPE */
.envelope {
  width: 240px;
  height: 150px;
  background: #89CFF0;
  margin: 80px auto;
  position: relative;
  border-radius: 10px;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 25px rgba(137,207,240,0.5);
}

/* flap */
.envelope:before {
  content: "";
  position: absolute;
  top: -75px;
  left: 0;
  width: 0;
  height: 0;
  border-left: 120px solid transparent;
  border-right: 120px solid transparent;
  border-bottom: 75px solid #89CFF0;
}

/* open animation */
.envelope.open {
  transform: scale(1.1);
  opacity: 0;
}

/* CONTENT */
.content {
  display: none;
  margin-top: 30px;
  padding: 25px;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 34px;
}

.message {
  font-size: 20px;
  margin-top: 15px;
}

/* hearts */
.heart {
  position: fixed;
  color: #89CFF0;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(100vh); opacity: 1;}
  to {transform: translateY(-10vh); opacity: 0;}
}

/* canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- INPUT -->
<div class="input-box" id="inputBox">
  <p>write your birth date</p>
  <input type="text" id="codeInput" placeholder="DDMMYYYY">
  <br>
  <button onclick="checkCode()">Open</button>
</div>

<!-- ENVELOPE -->
<div class="envelope" id="envelope" onclick="openEnvelope()"></div>

<!-- CONTENT -->
<div class="content" id="card">
  <h1>Muhannad & Sondos</h1>

  <p class="message">
    معرفتش اعبر غير كدة 🙂
  </p>
</div>

<script>
function checkCode() {
  const input = document.getElementById("codeInput");

  if (input.value === "11112004") {
    document.getElementById("envelope").style.display = "block";
    document.getElementById("inputBox").style.display = "none";
  } else {
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 300);
  }
}

function openEnvelope() {
  const envelope = document.getElementById("envelope");

  envelope.classList.add("open");

  setTimeout(() => {
    envelope.style.display = "none";
    document.getElementById("card").style.display = "block";
    startHearts();
    startConfetti();
  }, 600);
}

/* hearts */
function startHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

/* confetti */
function startConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  for (let i = 0; i < 100; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 6 + 2
    });
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#89CFF0";

    pieces.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    update();
  }

  function update() {
    pieces.forEach(p => {
      p.y += 2;
      if (p.y > canvas.height) {
        p.y = 0;
        p.x = Math.random() * canvas.width;
      }
    });
  }

  setInterval(draw, 20);
}
</script>

</body>
</html>
